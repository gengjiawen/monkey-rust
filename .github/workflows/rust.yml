name: Rust

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: npx envinfo
      - name: Build
        run: cargo build
      # Includes insta snapshot tests (lexer/parser). Fail on mismatch; do not write .snap.new.
      - name: Run tests (including insta snapshots)
        env:
          INSTA_UPDATE: no
        run: cargo test
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Add wasm target
        run: rustup target add wasm32-unknown-unknown
      - name: Build wasm package
        run: cd wasm && wasm-pack build --release --scope=gengjiawen
      - name: Build VS Code extension
        run: |
          corepack enable
          pnpm install --filter monkey-extension... --frozen-lockfile
          pnpm --filter monkey-extension run build
