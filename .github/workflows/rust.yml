name: Rust

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: npx envinfo
      - name: Build
        run: cargo build
      - name: Run tests
        run: cargo test
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Add wasm target
        run: rustup target add wasm32-unknown-unknown
      - name: Build wasm package
        run: cd wasm && wasm-pack build --release --scope=gengjiawen
      - name: Run wasm tests
        run: cd wasm && wasm-pack test --node
      - name: Run playground tests
        run: |
          corepack enable
          pnpm install --filter monkey-playground... --frozen-lockfile
          pnpm --filter monkey-playground test
      - name: Build VS Code extension
        run: |
          corepack enable
          pnpm install --filter monkey-extension... --frozen-lockfile
          pnpm --filter monkey-extension run build

  arm64-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install AArch64 toolchain and QEMU
        run: |
          sudo apt-get update
          sudo apt-get install --yes gcc-aarch64-linux-gnu qemu-user
          rustup target add aarch64-unknown-linux-gnu
      - name: Run Linux AArch64 end-to-end tests
        run: MONKEY_ASM_E2E_REQUIRED=1 cargo test -p monkey-asm -- --ignored --test-threads=1
      - name: Lint ARM64 backend
        run: cargo clippy -p monkey-asm --all-targets --no-deps

  arm64-e2e-macos:
    # Apple Silicon runner: the e2e suite exercises the Mach-O flavor natively.
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        run: |
          if ! command -v rustup >/dev/null; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
              | sh -s -- -y --default-toolchain stable --profile minimal
          fi
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - name: Run macOS AArch64 end-to-end tests
        run: MONKEY_ASM_E2E_REQUIRED=1 cargo test -p monkey-asm -- --ignored --test-threads=1
