packages:
  - packages/*
  - wasm/pkg

allowBuilds:
  '@swc/core': true
  '@vscode/vsce-sign': true
  esbuild: true
  keytar: true
  sharp: true

minimumReleaseAge: 0

minimumReleaseAgeExclude:
  - '@gengjiawen/monkey-wasm@0.12.1'

onlyBuiltDependencies:
  - '@swc/core'
  - '@vscode/vsce-sign'
  - esbuild
  - keytar
  - sharp
